{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&family=Pridi&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --cyan-500: #06b6d4;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background: var(--gray-900);
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        h1 {
            font-family: 'Pridi';
            font-size: 5rem;
            margin: 0;
        }

        p {
            color: var(--gray-500);
            margin: 1rem 0;
        }

        a {
            color: var(--cyan-500);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        a:hover {
            border-bottom: 2px solid var(--cyan-500);
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gray-700);
        }

        .big-404 {
            fill: var(--gray-500);
            font-size: 500px;
            font-weight: 800;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="text-container">
            <h1>404</h1>
            <p>Lost in the canyon? There's nothing here but sand.</p>
            <a href="{% url 'index' %}">Take Me Home</a>
        </div>

        <svg viewBox="0 0 2000 720" preserveAspectRatio="xMidYMid slice">
            <rect width="2000" height="720" fill="#1f2937" />
            <text id="parallax-text" x="1000" y="500" text-anchor="middle" class="big-404">404</text>
            <path d="M0 600 Q 500 550 1000 600 T 2000 600 V 720 H 0 Z" fill="#111827" />
        </svg>
    </div>

    <script>
        const text = document.getElementById('parallax-text')
        window.addEventListener('mousemove', (e) => {
            let x = (e.clientX / window.innerWidth) - 0.5
            let y = (e.clientY / window.innerHeight) - 0.5
            text.style.transform = `translate(${x * 50}px, ${y * 50}px)`
        })
    </script>
</body>

</html>
