{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/setup_profile.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <div class="image-side">
            <h1>Explore<br>The World</h1>
            <p>Your journey begins with a single step.</p>
        </div>

        <div class="form-side">
            <a href="{% url 'auth_page' %}" class="back-link">← Back</a>
            <h2>Create Profile</h2>
            <p class="subtitle">Personalize your travel experience</p>

            {% if error %}
            <p style="color: #f5365c; font-size: 14px; margin-bottom: 15px;">{{ error }}</p>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="profile-upload-section">
                    <label for="profile_img" class="upload-label">
                        <i class="fa-solid fa-camera"></i>
                        <span>Upload Photo *</span>
                    </label>
                    <input type="file" name="profile_img" id="profile_img" accept="image/*" required>
                </div>

                <div class="row-flex">
                    <div class="form-group">
                        <input type="text" name="first_name" placeholder="First Name *" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="last_name" placeholder="Last Name *" required>
                    </div>
                </div>

                <div class="row-flex">
                    <div class="form-group" style="flex: 0.4;">
                        <input type="number" name="age" placeholder="Age *" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="location" placeholder="City, Country *" required>
                    </div>
                </div>

                <div class="optional-label">ADDITIONAL INFO</div>

                <div class="form-group">
                    <input type="email" name="contact_email" placeholder="Secondary Email (Optional)">
                </div>

                <div class="form-group">
                    <textarea name="about_me" rows="2" placeholder="Tell us about yourself..."></textarea>
                </div>

                <button type="submit" class="btn-finish">Finish Registration</button>
            </form>
        </div>
    </div>

</body>
</html>
